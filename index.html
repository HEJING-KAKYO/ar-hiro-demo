<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HIRO AR</title>

    <!-- A-Frame 本体 -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js（マーカーAR用） -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
    >

      <!-- ======= HIROマーカーの設定 ======= -->
      <a-marker preset="hiro">
        <!-- 例1: 回転するカラフルなボックス -->
        <a-box
          position="0 0.5 0"
          rotation="0 45 0"
          scale="1 1 1"
          color="#FF6B6B"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear"
        ></a-box>

        <!-- 例2: ボックスの上に浮かぶ球体 -->
        <a-sphere
          position="0 2 0"
          radius="0.5"
          color="#4ECDC4"
          animation="property: position; to: 0 2.5 0; dir: alternate; loop: true; dur: 1000"
        ></a-sphere>

        <!-- 例3: 地面のリング -->
        <a-torus
          position="0 0.1 0"
          rotation="90 0 0"
          radius="0.8"
          radius-tubular="0.05"
          color="#FFE66D"
          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 800"
        ></a-torus>

        <!-- 例4: テキスト表示 -->
        <a-text
          value="Hello AR!"
          position="0 3 0"
          align="center"
          color="#FFFFFF"
          scale="2 2 2"
        ></a-text>

      </a-marker>

      <!-- カメラ -->
      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
