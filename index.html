<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Interactive Dancing Panda AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin:0; overflow:hidden;">
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
    >
      <a-assets>
        <canvas id="signCanvas" width="512" height="256"></canvas>
      </a-assets>

      <a-marker preset="hiro">
        <a-cylinder
          position="0 0.01 0"
          radius="0.35"
          height="0.02"
          color="#000000"
          opacity="0.2"
          animation="property: scale; from: 1 1 1; to: 0.5 1 0.5; dir: alternate; loop: true; dur: 600; easing: easeInOutSine"
        ></a-cylinder>

        <a-entity rotation="-90 0 0">
          
          <a-entity id="bowLayer">

            <a-entity
              animation="property: position; from: 0 0 0.4; to: 0 0 1.1; dir: alternate; loop: true; dur: 600; easing: easeInOutSine"
              animation__sway="property: rotation; from: -15 0 0; to: 15 0 0; dir: alternate; loop: true; dur: 800; easing: easeInOutSine"
            >

              <a-sphere position="0 0 0" radius="0.5" scale="1 1.1 0.9" color="#FFFFFF"></a-sphere>
              <a-sphere position="0 -0.05 0.42" radius="0.28" scale="1 1.1 0.5" color="#EDEDED"></a-sphere>
              
              <a-cylinder position="-0.52 0.1 0.1" radius="0.13" height="0.45" color="#1A1A1A" rotation="0 0 60"
                animation="property: rotation; from: 0 0 40; to: 0 0 80; dir: alternate; loop: true; dur: 400; easing: easeInOutSine"></a-cylinder>
              <a-cylinder position="0.52 0.1 0.1" radius="0.13" height="0.45" color="#1A1A1A" rotation="0 0 -60"
                animation="property: rotation; from: 0 0 -80; to: 0 0 -40; dir: alternate; loop: true; dur: 400; easing: easeInOutSine"></a-cylinder>
              
              <a-cylinder position="-0.25 -0.55 0" radius="0.14" height="0.38" color="#1A1A1A" rotation="15 0 10"></a-cylinder>
              <a-cylinder position="0.25 -0.55 0" radius="0.14" height="0.38" color="#1A1A1A" rotation="15 0 -10"></a-cylinder>
              
              <a-sphere position="0 0.7 0" radius="0.42" color="#FFFFFF"></a-sphere>
              <a-sphere position="-0.3 1.05 0" radius="0.15" color="#1A1A1A"></a-sphere>
              <a-sphere position="0.3 1.05 0" radius="0.15" color="#1A1A1A"></a-sphere>
              <a-sphere position="-0.16 0.73 0.36" radius="0.14" scale="1 0.85 0.5" color="#1A1A1A"></a-sphere>
              <a-sphere position="0.16 0.73 0.36" radius="0.14" scale="1 0.85 0.5" color="#1A1A1A"></a-sphere>
              <a-sphere position="-0.16 0.74 0.46" radius="0.055" color="#FFFFFF"></a-sphere>
              <a-sphere position="0.16 0.74 0.46" radius="0.055" color="#FFFFFF"></a-sphere>
              
              <a-sphere position="-0.16 0.74 0.5" radius="0.032" color="#000000"
                animation="property: scale; from: 1 1 1; to: 1 0.08 1; dir: alternate; loop: true; dur: 120; delay: 3000; easing: easeInOutQuad"></a-sphere>
              <a-sphere position="0.16 0.74 0.5" radius="0.032" color="#000000"
                animation="property: scale; from: 1 1 1; to: 1 0.08 1; dir: alternate; loop: true; dur: 120; delay: 3000; easing: easeInOutQuad"></a-sphere>
              
              <a-sphere position="0 0.63 0.42" radius="0.07" scale="1.2 0.8 0.6" color="#1A1A1A"></a-sphere>
              <a-torus position="0 0.56 0.41" radius="0.07" radius-tubular="0.012" arc="180" rotation="0 0 180" color="#1A1A1A"></a-torus>
              <a-sphere position="0 -0.15 -0.48" radius="0.1" color="#FFFFFF"></a-sphere>
              <a-plane 
                id="welcomeSign" 
                position="0 0.3 0.65" 
                width="1.2" 
                height="0.6" 
                material="src: #signCanvas; transparent: true" 
                scale="0 0 0"
              ></a-plane>

            </a-entity>
          </a-entity>
        </a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // --- 1. 动态绘制日语标语牌 ---
        const canvas = document.getElementById("signCanvas");
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "#F5DEB3"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 16;
        ctx.strokeStyle = "#8B4513";
        ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
        ctx.fillStyle = "#333333";
        ctx.font = "bold 52px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("imd研究室へ", canvas.width / 2, canvas.height / 2 - 35);
        ctx.fillText("ようこそ！", canvas.width / 2, canvas.height / 2 + 40);

        // --- 2. 交互与状态控制 ---
        let isAnimating = false;
        let isMarkerVisible = false; 
        let animationTimeouts = [];  

        const marker = document.querySelector("a-marker");
        const sign = document.querySelector("#welcomeSign");
        const bowLayer = document.querySelector("#bowLayer");

        // 监听摄像头是否丢失了目标
        marker.addEventListener("markerFound", () => {
          isMarkerVisible = true;
        });

        marker.addEventListener("markerLost", () => {
          isMarkerVisible = false;
          resetAnimationState(); 
        });

        // 重置函数
        function resetAnimationState() {
          animationTimeouts.forEach(clearTimeout);
          animationTimeouts = [];

          sign.removeAttribute("animation__show");
          sign.removeAttribute("animation__hide");
          bowLayer.removeAttribute("animation__bow");

          sign.setAttribute("scale", "0 0 0");
          bowLayer.setAttribute("rotation", "0 0 0");

          isAnimating = false; 
        }

        // 【关键修复 1】将交互动作提取成一个独立的函数
        function triggerInteraction(e) {
          // 如果没有看到熊猫，或者正在播放动画，则无视
          if (!isMarkerVisible || isAnimating) return;
          
          isAnimating = true;

          // 动作 A：弹出牌子
          sign.removeAttribute("animation__hide");
          void sign.offsetWidth; 
          sign.setAttribute("animation__show", "property: scale; from: 0 0 0; to: 1 1 1; dur: 600; easing: easeOutElastic");

          // 动作 B：3秒后收回牌子
          let t1 = setTimeout(() => {
            sign.removeAttribute("animation__show");
            void sign.offsetWidth; 
            sign.setAttribute("animation__hide", "property: scale; from: 1 1 1; to: 0 0 0; dur: 300; easing: easeInBack");

            // 动作 C：牌子收回后，开始鞠躬
            let t2 = setTimeout(() => {
              bowLayer.removeAttribute("animation__bow");
              void bowLayer.offsetWidth;
              bowLayer.setAttribute("animation__bow", "property: rotation; from: 0 0 0; to: 40 0 0; dir: alternate; loop: 2; dur: 500; easing: easeInOutSine");

              // 动作 D：鞠躬完成，解除锁定
              let t3 = setTimeout(() => {
                bowLayer.removeAttribute("animation__bow");
                isAnimating = false;
              }, 1000);
              animationTimeouts.push(t3);

            }, 350);
            animationTimeouts.push(t2);

          }, 3000);
          animationTimeouts.push(t1);
        }

        // 【关键修复 2】同时绑定鼠标点击和手机触摸事件
        window.addEventListener("click", triggerInteraction);
        
        // 专门针对手机端的触摸事件
        window.addEventListener("touchstart", (e) => {
          // 手机端触摸会优先触发 touchstart，
          // isAnimating 锁可以防止随后的 click 造成双重触发
          triggerInteraction(e);
        }, { passive: true }); 

      });
    </script>
  </body>
</html>
